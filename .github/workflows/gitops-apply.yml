# Run Ansible in update mode against your VPS
# Repository secrets:
#   GITOPS_LOCAL_ENV_B64       base64(local-env.yaml) — must include secrets.deploy.ssh_user
#   GITOPS_DEPLOY_KEY          same dedicated hm-gitops private key you use locally (see scripts/new-hm-gitops-key.sh)
#   GITOPS_DEPLOY_KEY_B64      optional single-line base64 of that key (for `act` locally)
#   GITOPS_BECOME_PASSWORD     optional sudo password if the VPS user is not NOPASSWD
#
# Do not use your primary ~/.ssh/id_* here — keep a separate key for this VPS/repo. Legacy GITOPS_SSH_KEY*
# still accepted for migration.
#
# For host key verification, add a workflow step or set ansible host_key_checking in ansible.cfg.
name: GitOps apply

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gitops-apply
  cancel-in-progress: true

jobs:
  ansible-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install --user ansible

      - name: Write local-env.yaml from secret
        env:
          GITOPS_LOCAL_ENV_B64: ${{ secrets.GITOPS_LOCAL_ENV_B64 }}
        run: |
          if [ -z "${GITOPS_LOCAL_ENV_B64}" ]; then
            echo "local-env.yaml not set" >&2
            exit 1
          fi
          echo "$GITOPS_LOCAL_ENV_B64" | base64 -d > local-env.yaml

      - name: Install deploy SSH key
        env:
          GITOPS_DEPLOY_KEY_B64: ${{ secrets.GITOPS_DEPLOY_KEY_B64 }}
          GITOPS_DEPLOY_KEY: ${{ secrets.GITOPS_DEPLOY_KEY }}
          GITOPS_SSH_KEY_B64: ${{ secrets.GITOPS_SSH_KEY_B64 }}
          GITOPS_SSH_KEY: ${{ secrets.GITOPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${GITOPS_DEPLOY_KEY_B64}" ]; then
            echo "${GITOPS_DEPLOY_KEY_B64}" | base64 -d > ~/.ssh/gitops
          elif [ -n "${GITOPS_DEPLOY_KEY}" ]; then
            printf '%s\n' "${GITOPS_DEPLOY_KEY}" > ~/.ssh/gitops
          elif [ -n "${GITOPS_SSH_KEY_B64}" ]; then
            echo "${GITOPS_SSH_KEY_B64}" | base64 -d > ~/.ssh/gitops
          elif [ -n "${GITOPS_SSH_KEY}" ]; then
            printf '%s\n' "${GITOPS_SSH_KEY}" > ~/.ssh/gitops
          fi
          if [ ! -s ~/.ssh/gitops ]; then
            echo "Set GITOPS_DEPLOY_KEY or GITOPS_DEPLOY_KEY_B64 (dedicated deploy key; not your personal SSH key)." >&2
            exit 1
          fi
          chmod 600 ~/.ssh/gitops

      - name: Run Ansible update
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          GITOPS_BECOME_PASSWORD: ${{ secrets.GITOPS_BECOME_PASSWORD }}
        run: |
          export PATH="$(python3 -m site --user-base)/bin:$PATH"
          BP="$HOME/.gitops_become_pass"
          if [ -n "${GITOPS_BECOME_PASSWORD}" ]; then
            printf '%s\n' "${GITOPS_BECOME_PASSWORD}" >"$BP"
            chmod 600 "$BP"
            ./hm-playbook.sh -e hm_action=update --private-key ~/.ssh/gitops --become-password-file "$BP"
            rm -f "$BP"
          else
            ./hm-playbook.sh -e hm_action=update --private-key ~/.ssh/gitops
          fi
