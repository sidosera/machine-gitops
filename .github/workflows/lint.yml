name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ansible-lint
        run: cd ansible && ansible-lint -c .ansible-lint playbook.yml roles inventory controller_layout.yml

      - name: yamllint
        run: |
          python -m yamllint -c .yamllint.yml local-env.example.yaml ansible/controller_layout.yml ansible/inventory/localhost.yml
          python -m yamllint -c .yamllint.yml k8s k8s/system

      - name: ruff
        run: python -m ruff check ansible/

      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck hm-playbook.sh
