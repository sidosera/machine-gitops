---
# HM VPS - full setup is defined in Ansible (roles/hm_vps).
#
# From repo root:
#   cp local-env.example.yaml local-env.yaml   # fill secrets.deploy + xray
#   ./hm-playbook.sh
# Or: ansible-playbook -i ansible/inventory/localhost.yml ansible/playbook.yml -e local_env_yaml_src=$PWD/local-env.yaml
#
# Play 1 loads controller_layout.yml + local-env.yaml and add_host's the hm group using
# Jinja ({{ secrets.deploy.* }}). No separate inventory renderer.
#
# Modes:
#   -e hm_action=deploy   (default) - full install path
#   -e hm_action=update - git pull, xray + optional hm-ci, kubectl apply -k k8s/ + getrafty template
#   -e hm_action=teardown - kubectl delete namespace hm (optional k3s-uninstall.sh)
#
- name: Register hm host from secrets file (controller)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Normalize hm_action (extra var or default deploy)
      ansible.builtin.set_fact:
        hm_action: "{{ hm_action | default('deploy') }}"

    - name: Require secrets file path on controller
      ansible.builtin.assert:
        that:
          - local_env_yaml_src is defined
          - (local_env_yaml_src | length) > 0
        fail_msg: "Use ./hm-playbook.sh or pass -e local_env_yaml_src=/path/to/local-env.yaml"
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Stat secrets file on controller
      ansible.builtin.stat:
        path: "{{ local_env_yaml_src }}"
      register: hm_pre_local_env
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Secrets file must exist on controller
      ansible.builtin.assert:
        that:
          - hm_pre_local_env.stat.exists
          - hm_pre_local_env.stat.isreg
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Load committed host layout (non-secret)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/controller_layout.yml"
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Load local-env.yaml from controller path
      ansible.builtin.include_vars:
        file: "{{ local_env_yaml_src }}"
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Assert secrets mapping present
      ansible.builtin.assert:
        that:
          - secrets is defined
          - secrets is mapping
          - secrets.deploy is defined
          - secrets.deploy is mapping
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Assert deploy secrets for SSH and git clone
      ansible.builtin.assert:
        that:
          - secrets.deploy.ansible_host is defined
          - (secrets.deploy.ansible_host | string | length) > 0
          - secrets.deploy.ssh_user is defined
          - (secrets.deploy.ssh_user | string | length) > 0
          - secrets.deploy.hm_git_repo is defined
          - (secrets.deploy.hm_git_repo | string | length) > 0
        fail_msg: "Set secrets.deploy.ansible_host, secrets.deploy.ssh_user, and secrets.deploy.hm_git_repo in local-env.yaml"
      when: hm_action in ['deploy', 'update', 'teardown']

    - name: Add hm host to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ hm_inventory_hostname }}"
        groups:
          - hm
        ansible_host: "{{ secrets.deploy.ansible_host }}"
        ansible_user: "{{ secrets.deploy.ssh_user }}"
        hm_git_repo: "{{ secrets.deploy.hm_git_repo }}"
        hm_git_ref: "{{ hm_git_ref }}"
        hm_xray_public_host: "{{ hm_xray_public_host }}"
        hm_getrafty_image: "{{ hm_getrafty_image }}"
        hm_action: "{{ hm_action }}"
      when: hm_action in ['deploy', 'update', 'teardown']

- name: HM VPS
  hosts: hm
  become: true
  gather_facts: true

  roles:
    - role: hm_vps
