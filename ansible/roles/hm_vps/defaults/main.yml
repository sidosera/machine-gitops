---
# Server layout
#   /srv/hm      - git clone; kubectl apply -k k8s/ runs from manifests here
#   /etc/hm      - local-env.yaml (secrets), xray/config.json (rendered)
hm_install_dir: /srv/hm
hm_config_dir: /etc/hm
hm_secrets_dest: "{{ hm_config_dir }}/local-env.yaml"
hm_git_ref: main
hm_git_force: false
hm_git_submodules: true
hm_purge_install: false

# k3s (https://k3s.io/) — single-node control plane + container runtime (containerd).
hm_k3s_channel: stable
hm_k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml

# Kubernetes namespace for HM workloads
hm_k8s_namespace: hm
hm_k8s_ci_secret_name: hm-ci
hm_k8s_xray_secret_name: hm-xray-config

# Top-level keys under secrets.* flattened into optional hm-ci Secret (envFrom). Empty = skip.
hm_ci_secret_roots: []

hm_apply_security: true
hm_auto_firewall: true
hm_auto_fail2ban: true
hm_auto_unattended_upgrades: true
hm_auto_ssh_harden: true
# Docker Engine is not installed when using k3s (containerd only).
hm_auto_docker_harden: false

# Controller: pass local_env_yaml_src (hm-playbook.sh sets it from HM_LOCAL_ENV).
# hm_git_repo comes from play 1 add_host (secrets.deploy.hm_git_repo).
# Public hostname for Traefik xray router; override via inventory or controller_layout.yml
hm_xray_public_host: proxy.hackamonth.io
# Docker Hub image for getrafty (override in controller_layout.yml / add_host)
hm_getrafty_image: docker.io/sidosera/getrafty-site:latest
# Repo-relative path after clone (Jinja; vars.secrets from local-env)
hm_xray_config_relpath: deploy/xray/config.yaml.j2

# Teardown: delete hm namespace; set true to run k3s-uninstall.sh (destructive).
hm_teardown_uninstall_k3s: false
