---
- name: Ensure Kubernetes namespace for HM stack exists
  ansible.builtin.command: kubectl create namespace {{ hm_k8s_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"

- name: Read secrets bundle from target (base64)
  ansible.builtin.slurp:
    src: "{{ hm_secrets_dest }}"
  register: hm_local_env_slurp

- name: Parse secrets file YAML (local-env.yaml on host)
  ansible.builtin.set_fact:
    hm_local_env: "{{ hm_local_env_slurp.content | b64decode | from_yaml }}"

- name: Assert secrets file root is a mapping
  ansible.builtin.assert:
    that:
      - hm_local_env is mapping

- name: Assert secrets block is present and a mapping
  ansible.builtin.assert:
    that:
      - hm_local_env.secrets is defined
      - hm_local_env.secrets is mapping

- name: Assert hm-ci secret roots exist under secrets
  when: hm_ci_secret_roots | length > 0
  ansible.builtin.assert:
    that:
      - hm_local_env.secrets[item] is defined
      - hm_local_env.secrets[item] is mapping
    fail_msg: "Missing or non-mapping secrets.{{ item }} in local-env.yaml"
    loop: "{{ hm_ci_secret_roots }}"

- name: Render hm-ci Kubernetes Secret manifest
  when: hm_ci_secret_roots | length > 0
  ansible.builtin.template:
    dest: /tmp/hm-ci-secret.yaml
    mode: "0600"
    src: hm-ci-secret.yaml.j2
  no_log: true

- name: Apply hm-ci Secret
  when: hm_ci_secret_roots | length > 0
  ansible.builtin.command: kubectl apply -f /tmp/hm-ci-secret.yaml
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  no_log: true
