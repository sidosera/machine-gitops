---
- name: Ensure install and config directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ hm_install_dir }}", mode: "0755" }
    - { path: "{{ hm_config_dir }}", mode: "0750" }
    - { path: "{{ hm_config_dir }}/xray", mode: "0750" }

- name: Placeholder xray JSON until xray_config.yml renders real config
  ansible.builtin.copy:
    dest: "{{ hm_config_dir }}/xray/config.json"
    content: "{}\n"
    owner: root
    group: root
    mode: "0600"
    force: false
