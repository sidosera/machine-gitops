---
- name: Check for k3s binary on target
  ansible.builtin.command: k3s --version
  register: hm_k3s_probe
  changed_when: false
  failed_when: false

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/src/k3s-install.sh
    mode: "0755"
  when: hm_k3s_probe.rc != 0

- name: Run k3s installer
  ansible.builtin.command: /usr/local/src/k3s-install.sh
  environment:
    INSTALL_K3S_CHANNEL: "{{ hm_k3s_channel }}"
  args:
    creates: /usr/local/bin/k3s
  when: hm_k3s_probe.rc != 0

- name: Wait for k3s kubeconfig
  ansible.builtin.wait_for:
    path: "{{ hm_k3s_kubeconfig }}"
    state: present
    timeout: 120

- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Symlink kubectl for root
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
    force: true

- name: Verify kubectl reaches API
  ansible.builtin.command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  register: hm_k3s_nodes
  changed_when: false

- name: Show k3s nodes
  ansible.builtin.debug:
    var: hm_k3s_nodes.stdout_lines
