---
- name: Supported OS
  ansible.builtin.include_tasks: assert_os.yml

- name: Remove Kubernetes stack (namespace / optional k3s uninstall)
  ansible.builtin.include_tasks: teardown.yml
  when: hm_action == 'teardown'

- name: Install or refresh stack
  ansible.builtin.include_tasks: install.yml
  when: hm_action in ['deploy', 'update']
