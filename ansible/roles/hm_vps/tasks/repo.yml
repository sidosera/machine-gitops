---
- name: Remove install directory when purging
  ansible.builtin.file:
    path: "{{ hm_install_dir }}"
    state: absent
  when: hm_purge_install | bool

- name: Clone or update GitOps repository
  ansible.builtin.git:
    repo: "{{ hm_git_repo }}"
    dest: "{{ hm_install_dir }}"
    version: "{{ hm_git_ref }}"
    update: true
    force: "{{ hm_git_force | bool }}"
    accept_hostkey: true

- name: Init git submodules
  ansible.builtin.command: git submodule update --init --recursive
  args:
    chdir: "{{ hm_install_dir }}"
  changed_when: true
  when: hm_git_submodules | bool

- name: Require k8s/kustomization.yaml in install dir
  ansible.builtin.stat:
    path: "{{ hm_install_dir }}/k8s/kustomization.yaml"
  register: hm_k8s_kust_stat

- name: Fail if k8s manifests missing after clone
  ansible.builtin.assert:
    that:
      - hm_k8s_kust_stat.stat.exists
    fail_msg: "{{ hm_install_dir }}/k8s/kustomization.yaml not found after git clone - check hm_git_repo / hm_git_ref."
