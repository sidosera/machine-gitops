---
- name: Firewall - allow SSH, HTTP, HTTPS and enable UFW
  ansible.builtin.shell: |
    set -e
    ufw allow OpenSSH >/dev/null || true
    ufw allow 80/tcp >/dev/null || true
    ufw allow 443/tcp >/dev/null || true
    ufw --force enable >/dev/null || true
  when: hm_auto_firewall | bool
  changed_when: false

- name: Install and enable fail2ban
  when: hm_auto_fail2ban | bool
  block:
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present
    - name: Enable fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

- name: Unattended security upgrades
  when: hm_auto_unattended_upgrades | bool
  block:
    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
    - name: Enable unattended-upgrades
      ansible.builtin.command: dpkg-reconfigure -f noninteractive unattended-upgrades
      changed_when: false
      failed_when: false

- name: SSH hardening snippet
  when: hm_auto_ssh_harden | bool
  block:
    - name: Drop weak SSH defaults
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hm.conf
        mode: "0644"
        content: |
          PasswordAuthentication no
          X11Forwarding no
          MaxAuthTries 3
    - name: Reload SSH
      ansible.builtin.systemd:
        name: "{{ 'ssh' if ansible_distribution == 'Ubuntu' else 'sshd' }}"
        state: reloaded

- name: Optional Docker daemon hardening (not used on k3s-only hosts; set hm_auto_docker_harden)
  when: hm_auto_docker_harden | bool
  block:
    - name: Check existing Docker daemon.json
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: hm_docker_daemon_stat

    - name: Write daemon.json and reload Docker (first time only)
      when: not hm_docker_daemon_stat.stat.exists
      block:
        - name: Write daemon.json
          ansible.builtin.copy:
            dest: /etc/docker/daemon.json
            mode: "0644"
            content: |
              {
                "live-restore": true,
                "no-new-privileges": true,
                "userland-proxy": false,
                "log-driver": "local",
                "log-opts": { "max-size": "10m", "max-file": "3" }
              }

        - name: Reload Docker
          ansible.builtin.systemd:
            name: docker
            state: reloaded
