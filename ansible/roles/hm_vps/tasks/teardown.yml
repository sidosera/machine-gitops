---
- name: Check for k3s kubeconfig
  ansible.builtin.stat:
    path: "{{ hm_k3s_kubeconfig }}"
  register: hm_k3s_kubeconfig_stat

- name: Remove HM Kubernetes namespace (workloads, PVCs, Secrets)
  ansible.builtin.command: kubectl delete namespace {{ hm_k8s_namespace }} --ignore-not-found=true --wait=true
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  register: hm_k8s_teardown
  changed_when: hm_k8s_teardown.rc == 0
  failed_when: false
  when: hm_k3s_kubeconfig_stat.stat.exists

- name: Uninstall k3s cluster (optional, destructive)
  ansible.builtin.command: /usr/local/bin/k3s-uninstall.sh
  when: hm_teardown_uninstall_k3s | bool
  register: hm_k3s_uninstall
  changed_when: hm_k3s_uninstall.rc == 0
  failed_when: false
