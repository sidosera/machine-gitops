---
- name: Resolve Xray template path on controller (repo root / deploy/xray)
  ansible.builtin.set_fact:
    hm_xray_template_controller_path: "{{ playbook_dir | dirname }}/deploy/xray/config.yaml.j2"

- name: Require Xray config template in git checkout
  ansible.builtin.stat:
    path: "{{ hm_install_dir }}/{{ hm_xray_config_relpath }}"
  register: hm_xray_tpl_stat

- name: Fail if deploy/xray config template is missing
  ansible.builtin.assert:
    that:
      - hm_xray_tpl_stat.stat.exists
      - hm_xray_tpl_stat.stat.isreg
    fail_msg: "Missing {{ hm_install_dir }}/{{ hm_xray_config_relpath }} (clone or add deploy/xray/config.yaml.j2)"

- name: Require at least one VLESS client UUID in local-env
  ansible.builtin.assert:
    that:
      - hm_xray_has_vless_client | bool
    fail_msg: >-
      Set secrets.xray.vless_clients (list of UUID strings) or legacy secrets.xray.vless_client_id — see local-env.example.yaml
  vars:
    hm_xray_has_vless_client: >-
      {{ (hm_local_env.secrets.xray.vless_clients | default([]) | length > 0)
      or (hm_local_env.secrets.xray.vless_client_id | default('') | string | trim | length > 0) }}

- name: Render Xray config (Jinja) to YAML on host
  ansible.builtin.template:
    src: "{{ hm_xray_template_controller_path }}"
    dest: "{{ hm_config_dir }}/xray/config.rendered.yaml"
    mode: "0600"
  vars:
    secrets: "{{ hm_local_env.secrets }}"
  no_log: true

- name: Read rendered Xray YAML on host
  ansible.builtin.slurp:
    src: "{{ hm_config_dir }}/xray/config.rendered.yaml"
  register: hm_xray_rendered_slurp

- name: Write canonical JSON for xray-core
  ansible.builtin.copy:
    dest: "{{ hm_config_dir }}/xray/config.json"
    content: "{{ hm_xray_rendered_slurp.content | b64decode | from_yaml | to_json }}\n"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Remove intermediate rendered YAML
  ansible.builtin.file:
    path: "{{ hm_config_dir }}/xray/config.rendered.yaml"
    state: absent

- name: Sync Xray config into Kubernetes Secret
  ansible.builtin.shell: >
    kubectl create secret generic {{ hm_k8s_xray_secret_name }}
    --namespace={{ hm_k8s_namespace }}
    --from-file=config.json={{ hm_config_dir }}/xray/config.json
    --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  no_log: true
