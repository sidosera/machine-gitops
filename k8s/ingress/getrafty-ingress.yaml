apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: getrafty
  namespace: hackamonth
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: hackamonth-security-headers@kubernetescrd
spec:
  tls:
    - hosts:
        - book.hackamonth.io
      secretName: book-hackamonth-io-tls
  rules:
    - host: book.hackamonth.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: getrafty
                port:
                  number: 80
