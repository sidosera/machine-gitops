apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xray
  template:
    metadata:
      labels:
        app: xray
    spec:
      containers:
        - name: xray
          image: ghcr.io/xtls/xray-core:26.3.27
          args: ["run", "-c", "/usr/local/etc/xray/config.json"]
          ports:
            - containerPort: 10086
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/xray
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: hm-xray-config
---
apiVersion: v1
kind: Service
metadata:
  name: xray
spec:
  selector:
    app: xray
  ports:
    - port: 10086
      targetPort: 10086
